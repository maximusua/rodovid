<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Родовід родини Гірілішен</title>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fffdf8; --ink:#2c2a26; --muted:#7a7468;
    --line:#c9bfa8; --accent:#7b5e3b;
    --ok:#4b7a4b; --ok-bg:#e6f0e3;
    --note:#b8862f; --note-bg:#f6edd8;
    --gap:#9a4b3b; --gap-bg:#f1e1dc;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Georgia","Times New Roman",serif;line-height:1.5}
  header{padding:28px 20px 14px;text-align:center}
  header h1{margin:0;font-size:26px;letter-spacing:.5px;color:var(--accent)}
  header p{margin:6px 0 0;color:var(--muted);font-size:14px}
  .legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
    margin:14px 0 4px;font-size:12.5px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.note{background:var(--note)} .dot.gap{background:var(--gap)}
  .tree{padding:10px 16px 60px;overflow-x:auto}
  ul.gen{list-style:none;margin:0;padding:0}
  ul.gen ul{list-style:none;margin:6px 0 0 0;padding:0 0 0 26px;
    border-left:2px solid var(--line)}
  ul.gen li{position:relative;margin:8px 0;padding-left:18px}
  ul.gen li::before{content:"";position:absolute;left:0;top:20px;
    width:16px;height:2px;background:var(--line)}
  ul.gen > li{padding-left:0}
  ul.gen > li::before{display:none}
  .card{display:inline-flex;flex-direction:column;gap:2px;
    background:var(--panel);border:1px solid var(--line);border-left-width:5px;
    border-radius:9px;padding:9px 13px;cursor:pointer;min-width:230px;
    box-shadow:0 1px 2px rgba(0,0,0,.05);transition:transform .08s,box-shadow .15s}
  .card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .card.ok{border-left-color:var(--ok)}
  .card.note{border-left-color:var(--note)}
  .card.gap{border-left-color:var(--gap)}
  .card .nm{font-weight:bold;font-size:15px}
  .card .meta{font-size:12.5px;color:var(--muted)}
  .card .sibs{font-size:11.5px;color:#8a7d5e;font-style:italic;margin-top:2px;max-width:300px}
  .person-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .sib-conj{align-self:center;font-size:10px;text-transform:uppercase;letter-spacing:.5px;
    color:#9a8c66;white-space:nowrap}
  .sibwrap{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;
    padding-left:10px;border-left:2px dotted var(--line)}
  .sibcard{background:#f3eee1;border:1px dashed var(--line);border-radius:8px;
    padding:6px 10px;max-width:215px}
  .sibcard .sibnm{display:block;font-weight:bold;font-size:12.5px;color:#4a4334}
  .sibcard .sibinfo{display:block;font-size:11px;color:var(--muted);margin-top:1px;line-height:1.35}
  .card .rel{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .badge{font-size:10px;padding:1px 7px;border-radius:10px;align-self:flex-start;margin-top:3px}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}
  .badge.note{background:var(--note-bg);color:var(--note)}
  .badge.gap{background:var(--gap-bg);color:var(--gap)}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,18,14,.45);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:10}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:14px;max-width:520px;width:100%;
    padding:24px 26px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:85vh;overflow:auto}
  .modal h2{margin:0 0 2px;color:var(--accent);font-size:21px}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .modal dl{margin:0;display:grid;grid-template-columns:130px 1fr;gap:7px 14px;font-size:14px}
  .modal dt{color:var(--muted)}
  .modal .close{float:right;cursor:pointer;border:none;background:none;
    font-size:22px;color:var(--muted);line-height:1}
  .modal .photo{margin:10px 0 4px;text-align:center}
  .modal .photo img{max-width:200px;border:3px solid #fff;border-radius:6px;
    box-shadow:0 2px 10px rgba(0,0,0,.25)}
  .modal .sibsbox{margin-top:14px;font-size:13.5px}
  .modal .sibsbox ul{margin:6px 0 0;padding-left:18px}
  .modal .sibsbox li{margin:3px 0}
  .modal .links{margin-top:14px;font-size:13px}
  .modal .links ul{margin:6px 0 0;padding-left:18px}
  .modal .links li{margin:3px 0}
  .modal .links a{color:var(--accent)}
  .modal .src{margin-top:16px;padding-top:12px;border-top:1px dashed var(--line);
    font-size:12.5px;color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:10px 20px 30px}
</style>
</head>

const STAT_LABEL={ok:"підтверджено документом",note:"зі слів / нотаток",gap:"прогалина / під сумнівом"};

function splitSib(s){
  const m=s.search(/\s\(|\s—/);
  if(m<0) return {nm:s, info:""};
  return {nm:s.slice(0,m).trim(), info:s.slice(m).trim()};
}
function render(node){
  const li=document.createElement("li");
  const row=document.createElement("div");
  row.className="person-row";
  const card=document.createElement("div");
  card.className="card "+node.status;
  card.innerHTML=`<span class="rel">${node.rel}</span>
    <span class="nm">${node.name}</span>
    <span class="meta">${node.born&&node.born!=="?"?"нар. "+node.born:"дати невідомі"}</span>
    <span class="badge ${node.status}">${STAT_LABEL[node.status]}</span>`;
  card.onclick=()=>openModal(node);
  row.appendChild(card);
  if(node.sibs&&node.sibs.length){
    const conj=document.createElement("span"); conj.className="sib-conj"; conj.textContent="брати/сестри";
    row.appendChild(conj);
    const wrap=document.createElement("div"); wrap.className="sibwrap";
    node.sibs.forEach(s=>{
      const {nm,info}=splitSib(s);
      const sc=document.createElement("div"); sc.className="sibcard";
      sc.innerHTML=`<span class="sibnm">${nm}</span>${info?`<span class="sibinfo">${info}</span>`:""}`;
      wrap.appendChild(sc);
    });
    row.appendChild(wrap);
  }
  li.appendChild(row);
  if(node.children&&node.children.length){
    const ul=document.createElement("ul");
    node.children.forEach(c=>ul.appendChild(render(c)));
    li.appendChild(ul);
  }
  return li;
}

function openModal(node){
  const rows=Object.entries(node.facts).map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join("");
  let linksHtml="";
  if(node.links&&node.links.length){
    linksHtml='<div class="links"><b>Посилання:</b><ul>'+
      node.links.map(l=>`<li><a href="${l.url}" target="_blank" rel="noopener">${l.label}</a></li>`).join("")+
      '</ul></div>';
  }
  let imgHtml="";
  if(node.img){ imgHtml=`<div class="photo"><img src="${node.img}" alt="фото"/></div>`; }
  let sibsHtml="";
  if(node.sibs&&node.sibs.length){
    sibsHtml='<div class="sibsbox"><b>Брати й сестри:</b><ul>'+
      node.sibs.map(s=>`<li>${s}</li>`).join("")+'</ul></div>';
  }
  document.getElementById("modal").innerHTML=
    `<button class="close" onclick="closeModal()">×</button>
     <h2>${node.name}</h2>
     <div class="sub">${node.rel} · ${STAT_LABEL[node.status]}</div>
     ${imgHtml}
     <dl>${rows}</dl>
     ${sibsHtml}
     ${linksHtml}
     <div class="src">Джерело: ${node.src}</div>`;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){document.getElementById("overlay").classList.remove("show");}
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

document.getElementById("root").appendChild(render(TREE));
</script>
